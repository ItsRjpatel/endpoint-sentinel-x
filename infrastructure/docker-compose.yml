version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: esx-db
    restart: always
    environment:
      POSTGRES_USER: esx_admin
      POSTGRES_PASSWORD: esx_password
      POSTGRES_DB: endpoint_sentinel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U esx_admin -d endpoint_sentinel"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: esx-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: esx-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://esx_admin:esx_password@db:5432/endpoint_sentinel
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=super_secret_jwt_key_for_sentinel_x_platform_development_123!
      - LOG_LEVEL=info
      - ENVIRONMENT=development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: esx-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
